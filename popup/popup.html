<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdBlock</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <div class="main-container"></div>
    <header class="header">
        <div class="header-left">
            <img src="../icons/icon48.png" alt="logo" class="logo" />
            <span class="app-name">AdBlock</span>
        </div>
        <div id="status-dot" class="status-dot"></div>
    </header>

    <section class="toggle-section">
        <div class="toggle-info">
            <span class="toggle-title">Chặn quảng cáo</span>
            <span id="toggle-label" class="toggle-label">Đang bật</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="toggle-switch" checked />
            <span class="slider"></span>
        </label>
    </section>

    <hr class="divider" />

    <section class="stats-section">
        <div class="stat-card">
            <span id="tab-blocked-count" class="stat-number">0</span>
            <span class="stat-desc">Trang này</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-card">
            <span id="total-blocked-count" class="stat-number">0</span>
            <span class="stat-desc">Tổng cộng</span>
        </div>
    </section>

    <hr class="divider" />

    <section class="domain-section">
        <svg class="domain-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <span id="hostname-label" class="hostname">Đang tải...</span>
    </section>

    <section class="actions-section">
        <button id="whitelist-btn" class="btn btn-danger">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
            </svg>
            Tắt cho trang này
        </button>
        <button id="picker-btn" class="btn btn-secondary">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="22" y1="12" x2="18" y2="12"></line>
                <line x1="6" y1="12" x2="2" y2="12"></line>
                <line x1="12" y1="6" x2="12" y2="2"></line>
                <line x1="12" y1="22" x2="12" y2="18"></line>
            </svg>
            Chặn phần tử
        </button>
    </section>

    <footer class="footer">
        <span>NT208 - Nhóm 16</span>
    </footer>

    <script src="popup.js"></script>
    </div>
</body>
</html>
